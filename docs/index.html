<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV 频道列表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;width:100%;padding:40px 20px;text-align:center}
h1{font-size:2em;margin-bottom:8px;color:#fff}
.subtitle{color:#888;margin-bottom:32px;font-size:.9em}
.links{display:flex;flex-direction:column;gap:12px}
a{display:block;padding:16px 24px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;color:#4fc3f7;text-decoration:none;font-size:1.1em;font-weight:500;transition:all .2s}
a:hover{background:#1a1a3e;border-color:#4fc3f7;transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,195,247,.15)}
a .format{color:#888;font-size:.8em;margin-left:6px}
.update-info{margin-top:24px;color:#555;font-size:.75em}
</style>
</head>
<body>
<div class="container">
  <h1>IPTV 频道列表</h1>
  <p class="subtitle">咪咕 + 芒果TV 直播源，每6小时自动更新</p>
  <div class="links">
    <a href="tv.m3u">📺 M3U 格式 <span class="format">适用于 VLC / IPTV 播放器</span></a>
    <a href="tv.txt">📝 TXT 格式 <span class="format">适用于影视仓 / DIYP</span></a>
  </div>
  <p class="update-info">播放链接由 GitHub Actions 自动生成，包含真实播放地址</p>
</div>
</body>
</html>
